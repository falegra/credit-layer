version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "internal/infrastructure/postgres/db"
        emit_json_tags: true
        emit_interface: true
        sql_package: "pgx/v5"
        overrides:
            - db_type: "uuid"
              go_type: "github.com/google/uuid.UUID"
            - db_type: "timestamptz"
              go_type: "time.Time"